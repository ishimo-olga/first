<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Computer Shop</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .card {
            background: white;
            width: 250px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

<header>
    <h1>Computer Store</h1>
</header>

<div class="container">

    <!-- Product 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/250x180?text=HP+Laptop" alt="HP Laptop">
        <h3>HP Laptop</h3>
        <p class="price">$500</p>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Product 2 -->
    <div class="card">
        <img src="https://via.placeholder.com/250x180?text=Dell+Laptop" alt="Dell Laptop">
        <h3>Dell Laptop</h3>
        <p class="price">$650</p>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Product 3 -->
    <div class="card">
        <img src="https://via.placeholder.com/250x180?text=Lenovo+Laptop" alt="Lenovo Laptop">
        <h3>Lenovo Laptop</h3>
        <p class="price">$550</p>
        <button class="btn">Add to Cart</button>
    </div>

</div>

</body>
</html>
