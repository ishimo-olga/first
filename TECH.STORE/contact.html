<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            background: #0f2027;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        .navbar a:hover {
            color: #ff9800;
        }

        /* CONTACT FORM */
        .contact {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        .contact h2 {
            text-align: center;
        }

        .contact input,
        .contact textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        .contact button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #ff9800;
            border: none;
            color: white;
            cursor: pointer;
        }

        .contact button:hover {
            background: #e68900;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- CONTACT FORM -->
    <div class="contact">
        <h2>Contact Us</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</body>
</html>
